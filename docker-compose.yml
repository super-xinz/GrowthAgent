services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: reddit_growth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reddit_growth"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  xiaohongshu-mcp:
    build:
      context: ./可以参考的开源项目/xiaohongshu-mcp-main
      dockerfile: Dockerfile.arm64
    image: growthagent-xiaohongshu-mcp:local
    restart: unless-stopped
    init: true
    tty: true
    environment:
      ROD_BROWSER_BIN: /usr/local/bin/cloak-chromium
      COOKIES_PATH: /app/data/cookies.json
      HOME: /app/data/home
      XDG_CACHE_HOME: /app/data/cache
      XDG_CONFIG_HOME: /app/data/config
    ports: ["18060:18060"]
    volumes:
      - ./.xiaohongshu-data:/app/data
  api:
    build: {context: ., dockerfile: infra/docker/api.Dockerfile}
    env_file: .env
    ports: ["8000:8000"]
    volumes: [./apps/api:/app/apps/api, ./tests:/app/tests]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
      xiaohongshu-mcp: {condition: service_started}
  worker:
    build: {context: ., dockerfile: infra/docker/api.Dockerfile}
    command: celery -A app.worker.celery_app worker -B --loglevel=INFO
    env_file: .env
    volumes: [./apps/api:/app/apps/api]
    depends_on: [postgres, redis]
  web:
    build: {context: ., dockerfile: infra/docker/web.Dockerfile}
    environment:
      API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on: [api]
volumes:
  postgres_data:
