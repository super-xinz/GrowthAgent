name: Bug report
description: 报告可复现的问题
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: 请勿上传 API Key、Cookie、`.env` 或未打码日志。
  - type: input
    id: version
    attributes: {label: 版本, placeholder: "v0.1.0 / commit SHA"}
    validations: {required: true}
  - type: dropdown
    id: system
    attributes:
      label: 系统
      options: [Windows, macOS, Linux, 其他]
    validations: {required: true}
  - type: textarea
    id: steps
    attributes: {label: 复现步骤}
    validations: {required: true}
  - type: textarea
    id: expected
    attributes: {label: 期望与实际结果}
    validations: {required: true}
  - type: textarea
    id: logs
    attributes: {label: 已打码日志, render: shell}
