version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule: {interval: weekly}
    groups:
      web-dependencies: {patterns: ["*"]}
  - package-ecosystem: pip
    directory: /apps/api
    schedule: {interval: weekly}
    groups:
      api-dependencies: {patterns: ["*"]}
  - package-ecosystem: gomod
    directory: /
    schedule: {interval: weekly}
  - package-ecosystem: github-actions
    directory: /
    schedule: {interval: weekly}
